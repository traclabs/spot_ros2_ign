/**:
  ros__parameters:
    gait:
      knee_orientation: ">>"
      pantograph_leg: false
      odom_scaler: 0.9
      max_linear_velocity_x: 0.20 #0.50
      max_linear_velocity_y: 0.25
      max_angular_velocity_z: 1.0
      com_x_translation: 0.0
      swing_height: 0.04 #0.04
      stance_depth: 0.002 #0.00 
      stance_duration: 0.25
      nominal_height: 0.5 #0.2
    loop_rate: 50.0
    use_sim_time: true
    #added by diya 9/4
    # odom_frame: odom
    # base_link_frame: base_link
    base: base_link
    # LINKS for SPOT
    left_front_links: ["front_left_hip", "front_left_upper_leg", "front_left_lower_leg", "front_left_foot"]
    left_hind_links: ["rear_left_hip", "rear_left_upper_leg", "rear_left_lower_leg", "rear_left_foot"]
    right_front_links: ["front_right_hip", "front_right_upper_leg", "front_right_lower_leg", "front_right_foot"]
    right_hind_links: ["rear_right_hip", "rear_right_upper_leg", "rear_right_lower_leg", "rear_right_foot"]
    # JOINTS for SPOT
    left_front_joints: ["front_left_hip_x", "front_left_hip_y", "front_left_knee"]
    left_hind_joints: ["rear_left_hip_x", "rear_left_hip_y", "rear_left_knee"]
    right_front_joints: ["front_right_hip_x", "front_right_hip_y", "front_right_knee"]
    right_hind_joints: ["rear_right_hip_x", "rear_right_hip_y", "rear_right_knee"]

